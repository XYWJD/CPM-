<！doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPM谢余工作室 king解锁工具</title>
    <style>
        身体 { 字体系列: "微软雅黑", 无衬线; 最大宽度: 800PX; 边缘: 0 自动; 填充: 20PX; 背景：#f5f5f5；}
        .容器 { 背景: 白色的; 填充: 30PX; 边界半径: 10PX; 箱形阴影: 0 2PX 10PX RGBA(0,0,0,0.1); }
        .输入组 { 底边距: 20PX; }
        输入 { 宽度: 100%; 填充: 10PX; 上边距: 5PX; 边境: 1PX 固体#ddd；边界半径: 5PX; }
        按钮 { 背景：#4CAF50；颜色: 白色的; 边境: 没有一个; 填充: 12PX 20PX; 边界半径: 5PX; 光标: 指针; 宽度: 100%; 字体大小: 16PX; }
        按钮:盘旋 { 背景：#45a049；}
        .日志框 { 上边距: 20PX; 填充: 15PX; 背景：#2d2d2d；颜色：#fff；边界半径: 5PX; 高度: 300PX; 溢流y: 自动; 字体系列: 等宽; }
        .消息 { 上边距: 10PX; 填充: 10PX; 边界半径: 5PX; 显示: 没有一个; }
        .成功 { 背景：#dff0d8；颜色：#3c763d；}
        .误差 { 背景：#f2dede；颜色：#a94442；}
    </style>
</头>
<body>
    <div class="container">
        <h1>CPM谢余工作室 king解锁工具</h1>
        
        <! -- 登录区域 -->
        <div id="login-area">
            <h3>请先登录</h3>
            <div class="input-group">
                <label>邮箱</label>
                <input type="email" id="email" value="572991055@qq.com">
            </div>
            <div class="input-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="输入密码">
            </div>
            <button onclick="登录()">登录</按钮>
            <div id="login-msg" class="message"></div>
        </div>

        <! -- 解锁成就区域（登录后显示） -->
        <div id="unlock-area" style="显示: 没有一个;">
            <h3>成就操作</h3>
            <button onclick="unlockAllAchievements()">解锁所有成就</按钮>
            <div id="unlock-msg" class="message"></div>
        </div>

        <! -- 日志区域 -->
        <div class="log-box">
            <div id="log">加载中...</div>
        </div>
    </div>

    <script>
        //后端API地址(Render部署后自动适配同域名，无需修改）
        Const API_BASE='';

        // 日志显示函数
        功能 addLog(文本) {
            Const Logel=文件.getElementById('日志');
            Const 时间=新的 日期().toLocaleTimeString();
            Logel.innerHTML+='<div>[${时间}] ${文本}</div> += 
            Logel.scrollTop=Logel.scrollHeight;
        }

        // 登录功能
        异步 功能 登录() {
            Const 电子邮件=文件.getElementById('电子邮件').价值;
            Const 密码=文件.getElementById('密码').价值;
            Const msgEl=文件.getElementById('login-msg');

            尝试 {
                addLog('开始登录...');
                Const 响应=等候 取来(`${API_BASE}/login', {
                    方法: 'POST',
                    页眉: { '内容类型': '应用程序/json' },
                    身体: JSON.使字符串化({ 电子邮件, 密码 })
                });

                Const 数据=等候 响应.JSON();
                如果 (!响应.好的) 扔 新的 误差(数据.细节||'登录失败');

                localStorage.setitem('令牌', 数据.令牌);
                addLog('登录成功！');
                msgEl.className='消息成功';
                msgEl.textContent='登录成功！';
                msgEl.风格.显示='块';
                文件.getElementById('解锁区域').风格.显示='块';

            } 赶上 (犯错) {
                addLog(`登录失败：${犯错.消息}`);
                msgEl.className='消息错误';
                msgEl.textContent=犯错.消息;
                msgEl.风格.显示='块';
            }
        }

        // 解锁成就功能
        异步 功能 unlockAllAchievements() {
            Const 令牌=localStorage.getitem('令牌');
            Const msgEl=文件.getElementById('unlock-msg');
            如果 (!令牌) {
                addLog('请先登录！');
                返回;
            }

            尝试 {
                addLog('开始解锁所有成就... ');
                Const 响应=等候 取来(`${API_BASE}/proxy-unlock', {
                    方法: 'POST',
                    页眉: { 
                        '内容类型': '应用程序/json',
                        '授权': '承载器${令牌}`
                    },
                    身体: JSON.使字符串化({
                        数据: JSON.使字符串化({
                            RatingData: {
                                T_distance: 2000000000, 时间: 2000000000, 速度横幅(_B): 2000000000,
                                礼物: 2000000000, 宝藏: 2000000000, 汽车: 137, race_win: 999,
                                级别: 82, 漂流: 2000000000, 跑: 2000000000, 警察: 2000000000,
                                block_post: 2000000000, 不动产(_R): 12, 燃料: 2000000000,
                                car_trade: 2000000000, car_exchange: 2000000000, burned_tire: 2000000000,
                                car_fix: 2000000000, car_wash: 2000000000, 越野: 2000000000,
                                乘客距离: 2000000000, 反应: 2000000000, 漂移最大值: 2000000000,
                                出租车: 2000000000, 交付: 2000000000, 货物: 2000000000,
                                俯卧撑(_U): 2000000000, 切片器切割(_C): 1, car_Collided: 2000, 新建类型(_T): 2000
                            }
                        })
                    })
                });

                Const 数据=等候 响应.JSON();
                如果 (!响应.好的) 扔 新的 误差(数据.细节||'解锁失败');

                addLog('所有成就解锁成功！ ');
                msgEl.className='消息成功';
                msgEl.textContent='解锁成功！';
                msgEl.风格.显示='块';

            } 赶上 (犯错) {
                addLog(`解锁失败：${犯错.消息}`);
                msgEl.className='消息错误';
                msgEl.textContent=犯错.消息;
                msgEl.风格.显示='块';
            }
        }

        addLog('页面加载完成，请登录后解锁成就');
    </script>
</body>
</超文本标记语言>
